<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 130" width="360" height="130">
  <defs>
    <marker id="arrowC" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#4DB6AC"/>
    </marker>
    <marker id="arrowM" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#FF9800"/>
    </marker>
  </defs>

  <!-- Individual -->
  <g transform="translate(20,5)">
    <text x="80" y="18" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#333">Individual</text>
    <!-- sample circles -->
    <circle cx="30" cy="45" r="10" fill="#4DB6AC" opacity="0.7"/>
    <circle cx="65" cy="45" r="10" fill="#4DB6AC" opacity="0.7"/>
    <circle cx="100" cy="45" r="10" fill="#4DB6AC" opacity="0.7"/>
    <circle cx="135" cy="45" r="10" fill="#4DB6AC" opacity="0.7"/>
    <text x="30" y="70" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#777">S1</text>
    <text x="65" y="70" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#777">S2</text>
    <text x="100" y="70" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#777">S3</text>
    <text x="135" y="70" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#777">S4</text>
    <!-- arrows down -->
    <line x1="30" y1="55" x2="30" y2="80" stroke="#4DB6AC" stroke-width="1.5" marker-end="url(#arrowC)"/>
    <line x1="65" y1="55" x2="65" y2="80" stroke="#4DB6AC" stroke-width="1.5" marker-end="url(#arrowC)"/>
    <line x1="100" y1="55" x2="100" y2="80" stroke="#4DB6AC" stroke-width="1.5" marker-end="url(#arrowC)"/>
    <line x1="135" y1="55" x2="135" y2="80" stroke="#4DB6AC" stroke-width="1.5" marker-end="url(#arrowC)"/>
    <!-- assemblies -->
    <circle cx="30" cy="95" r="10" fill="#4DB6AC" opacity="0.9"/>
    <circle cx="65" cy="95" r="10" fill="#4DB6AC" opacity="0.9"/>
    <circle cx="100" cy="95" r="10" fill="#4DB6AC" opacity="0.9"/>
    <circle cx="135" cy="95" r="10" fill="#4DB6AC" opacity="0.9"/>
    <text x="30" y="120" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#777">A1</text>
    <text x="65" y="120" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#777">A2</text>
    <text x="100" y="120" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#777">A3</text>
    <text x="135" y="120" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#777">A4</text>
  </g>

  <!-- OR divider -->
  <text x="185" y="65" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#999">OR</text>

  <!-- Combined / Co-assembly -->
  <g transform="translate(210,5)">
    <text x="65" y="18" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#333">Combined</text>
    <!-- sample circles -->
    <circle cx="20" cy="45" r="10" fill="#FFB74D" opacity="0.7"/>
    <circle cx="50" cy="35" r="10" fill="#FFB74D" opacity="0.7"/>
    <circle cx="80" cy="45" r="10" fill="#FFB74D" opacity="0.7"/>
    <circle cx="110" cy="35" r="10" fill="#FFB74D" opacity="0.7"/>
    <text x="20" y="70" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#777">S1</text>
    <text x="50" y="60" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#777">S2</text>
    <text x="80" y="70" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#777">S3</text>
    <text x="110" y="60" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#777">S4</text>
    <!-- arrows merging -->
    <line x1="25" y1="54" x2="55" y2="82" stroke="#FF9800" stroke-width="1.5" marker-end="url(#arrowM)"/>
    <line x1="50" y1="45" x2="58" y2="82" stroke="#FF9800" stroke-width="1.5" marker-end="url(#arrowM)"/>
    <line x1="75" y1="54" x2="61" y2="82" stroke="#FF9800" stroke-width="1.5" marker-end="url(#arrowM)"/>
    <line x1="105" y1="45" x2="64" y2="82" stroke="#FF9800" stroke-width="1.5" marker-end="url(#arrowM)"/>
    <!-- merged assembly -->
    <circle cx="65" cy="95" r="18" fill="#FF9800" opacity="0.9"/>
    <text x="65" y="120" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#777">Co-assembly</text>
  </g>
</svg>
