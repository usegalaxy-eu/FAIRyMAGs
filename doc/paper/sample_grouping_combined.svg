<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 130" width="160" height="130">
  <defs>
    <marker id="arrowM" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#FF9800"/>
    </marker>
  </defs>
  <text x="80" y="18" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#333">Combined</text>
  <!-- sample circles -->
  <circle cx="25" cy="45" r="10" fill="#FFB74D" opacity="0.7"/>
  <circle cx="57" cy="35" r="10" fill="#FFB74D" opacity="0.7"/>
  <circle cx="89" cy="45" r="10" fill="#FFB74D" opacity="0.7"/>
  <circle cx="121" cy="35" r="10" fill="#FFB74D" opacity="0.7"/>
  <text x="25" y="70" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#777">S1</text>
  <text x="57" y="60" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#777">S2</text>
  <text x="89" y="70" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#777">S3</text>
  <text x="121" y="60" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#777">S4</text>
  <!-- arrows merging -->
  <line x1="28" y1="54" x2="62" y2="82" stroke="#FF9800" stroke-width="1.5" marker-end="url(#arrowM)"/>
  <line x1="57" y1="45" x2="66" y2="82" stroke="#FF9800" stroke-width="1.5" marker-end="url(#arrowM)"/>
  <line x1="86" y1="54" x2="69" y2="82" stroke="#FF9800" stroke-width="1.5" marker-end="url(#arrowM)"/>
  <line x1="118" y1="45" x2="72" y2="82" stroke="#FF9800" stroke-width="1.5" marker-end="url(#arrowM)"/>
  <!-- merged assembly -->
  <circle cx="80" cy="95" r="18" fill="#FF9800" opacity="0.9"/>
  <text x="80" y="120" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#777">Co-assembly</text>
</svg>
