<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 130" width="360" height="130">
  <!-- Completeness/Contamination scatter (left) -->
  <g transform="translate(5,5)">
    <text x="80" y="18" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#333">Comp./Contam.</text>
    <!-- axes -->
    <line x1="25" y1="95" x2="135" y2="95" stroke="#555" stroke-width="1.5"/>
    <line x1="25" y1="25" x2="25" y2="95" stroke="#555" stroke-width="1.5"/>
    <text x="15" y="60" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#777" transform="rotate(-90,15,60)">Contam.</text>
    <text x="80" y="110" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#777">Completeness</text>
    <!-- scatter points colored by quality -->
    <circle cx="110" cy="35" r="4" fill="#4CAF50" opacity="0.8"/>
    <circle cx="95" cy="78" r="4" fill="#4CAF50" opacity="0.8"/>
    <circle cx="120" cy="30" r="4" fill="#4CAF50" opacity="0.8"/>
    <circle cx="80" cy="45" r="4" fill="#FFC107" opacity="0.8"/>
    <circle cx="60" cy="40" r="4" fill="#FFC107" opacity="0.8"/>
    <circle cx="45" cy="65" r="4" fill="#FF5722" opacity="0.8"/>
    <circle cx="50" cy="85" r="4" fill="#FF5722" opacity="0.8"/>
    <circle cx="70" cy="60" r="4" fill="#4CAF50" opacity="0.8"/>
    <circle cx="105" cy="55" r="4" fill="#FFC107" opacity="0.8"/>
    <circle cx="40" cy="45" r="4" fill="#FF5722" opacity="0.8"/>
    <!-- horizontal threshold lines -->
    <line x1="25" y1="50" x2="135" y2="50" stroke="#ccc" stroke-width="0.5" stroke-dasharray="3,2"/>
    <line x1="25" y1="70" x2="135" y2="70" stroke="#ccc" stroke-width="0.5" stroke-dasharray="3,2"/>
    <!-- legend -->
    <rect x="30" y="112" width="6" height="6" rx="1" fill="#4CAF50"/>
    <text x="38" y="118" font-family="sans-serif" font-size="7" fill="#777">HQ</text>
    <rect x="60" y="112" width="6" height="6" rx="1" fill="#FFC107"/>
    <text x="68" y="118" font-family="sans-serif" font-size="7" fill="#777">MQ</text>
    <rect x="90" y="112" width="6" height="6" rx="1" fill="#FF5722"/>
    <text x="98" y="118" font-family="sans-serif" font-size="7" fill="#777">LQ</text>
  </g>

